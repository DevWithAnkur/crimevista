name: crimevista

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: crimevista_db
    restart: always
    environment:
      POSTGRES_DB: crimevista
      POSTGRES_USER: crimevista_user
      POSTGRES_PASSWORD: crimevista_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crimevista_user -d crimevista"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: crimevista_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://crimevista_user:crimevista_password@db:5432/crimevista
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/workspace/backend
      - ./ai_ml:/workspace/ai_ml

  ai_ml:
    build:
      context: .
      dockerfile: ai_ml/Dockerfile
    container_name: crimevista_ai_ml
    restart: always
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8001:8001"
    volumes:
      - ./ai_ml:/workspace/ai_ml

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crimevista_frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
